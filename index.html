<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-DashBoard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="dashboard">
            <h1> <img src="assets/view-dashboard.svg" alt="DASHBOARD">DASHBOARD</h1>
            <div class="upper-dashboard">
                <a href="#"><img src="assets/home (1).svg" alt="home">Home</a>
                <a href="#"><img src="assets/account.svg" alt="Profile">Profile</a>
                <a href="#"><img src="assets/message-text.svg" alt="Messages">Messages</a>
                <a href="#"><img src="assets/history.svg" alt="History">History</a>
                <a href="#"><img src="assets/calendar-check.svg" alt="Tasks">Tasks</a>
                <a href="#"><img src="assets/account-group.svg" alt="Communities">Communities</a>
            </div>
            <div class="lower-dashboard">
                <a href="#"><img src="assets/cog.svg" alt="Setting">Setting</a>
                <a href="#"><img src="assets/face-agent.svg" alt="Support">Support</a>
                <a href="#"><img src="assets/shield-account.svg" alt="Privacy">Privacy</a>
            </div>
        </div>

        <div class="navbar">

                <div class="search-box"><img src="assets/search-web.svg" alt="search"><input type="text"></div>
                <div class="profile">
                    <img src="assets/bell-ring.svg" alt="Bell">
                    <div class="profile-pic"><img src="assets/img_avatar.png" alt="face"></div>
                    <div class="profile-name">ABHILASH SATPATHY</div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="greeting">
                 
                </div>
                <div class="buttons">
                    <button type="button">New</button>
                    <button type="button">share</button>
                    <button type="button">Upload</button>
                </div>
            </div>


        </div>

        <div class="content-page">
            <!-- <h2>Your projects</h2> -->
            <div class="projects">
                <div class="card">1</div>
                <div class="card">2</div>
                <div class="card">3</div>
                <div class="card">4</div>
                <div class="card">5</div>
                <div class="card">6</div>
            </div>
            <div class="I am rightpanel">right panel
                <div class="announcements">
                    <div class="announces">1</div>
                    <div class="announces">2</div>
                    <div class="announces">3</div>
                </div>
                <div class="trending">
                    <div></div>
                    <trends>1</trends>
                    <trends>2</trends>
                    <trends>3</trends>
                    <trends>4</trends>

            </div>
